name: 🐛 Bug Report
description: Report a critical bug in LNN
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## ⚠️ Repository Status
        
        **This repository is archived and in maintenance mode.**
        
        We are only accepting:
        - 🔒 Security fixes
        - 🐛 Critical bug fixes  
        - 📝 Documentation corrections
        
        Other feature requests and enhancements will not be reviewed.
        
        ---
        
  - type: checkboxes
    id: issue-type
    attributes:
      label: Issue Type
      description: Please confirm this is one of the accepted types
      options:
        - label: This is a security vulnerability
        - label: This is a critical bug that prevents basic functionality
        - label: This is a documentation error
          
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
      placeholder: What happened?
    validations:
      required: true
      
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Import lnn
        2. Run example code
        3. See error
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: It should...
    validations:
      required: true
      
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your environment details
      value: |
        - Python version:
        - LNN version:
        - Operating System:
        - torch version:
        - numpy version:
    validations:
      required: true
      
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem
      placeholder: Stack traces, screenshots, etc.
